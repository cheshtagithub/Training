<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-copy">
                <span class="auth-eyebrow">User Authentication System</span>
                <h1>Create your account</h1>
                <p>Start with a secure account to access your dashboard and profile.</p>
            </div>

            <form id="signup-form" class="auth-form">
                <label class="input-group" for="name">
                    <span>Name</span>
                    <input id="name" name="name" type="text" placeholder="John Doe" required>
                </label>

                <label class="input-group" for="email">
                    <span>Email</span>
                    <input id="email" name="email" type="email" placeholder="you@example.com" required>
                </label>

                <label class="input-group" for="password">
                    <span>Password</span>
                    <input id="password" name="password" type="password" placeholder="Minimum 8 characters" minlength="8" required>
                </label>

                <button type="submit" class="auth-button">Sign Up</button>
                <p id="signup-message" class="form-message" aria-live="polite"></p>
            </form>

            <p class="auth-switch">
                Already have an account?
                <a href="http://127.0.0.1:8000/login.html">Login</a>
            </p>
        </section>
    </main>

    <script src="/frontend/js/auth.js"></script>
</body>
</html>
