<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-copy">
                <span class="auth-eyebrow">Reset Access</span>
                <h1>Create a new password</h1>
                <p>Enter a new secure password to regain access to your account.</p>
            </div>

            <form id="reset-form" class="auth-form">
                <label class="input-group" for="new-password">
                    <span>New Password</span>
                    <input id="new-password" name="new_password" type="password" placeholder="Minimum 8 characters" minlength="8" required>
                </label>

                <button type="submit" class="auth-button">Reset Password</button>
                <p id="reset-message" class="form-message" aria-live="polite"></p>
            </form>

            <p class="auth-switch">
                Remembered your password?
                <a href="http://127.0.0.1:8000/login.html">Login</a>
            </p>
        </section>
    </main>

    <script src="/frontend/js/reset.js"></script>
</body>
</html>
