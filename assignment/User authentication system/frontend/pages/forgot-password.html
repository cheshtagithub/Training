<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-copy">
                <span class="auth-eyebrow">Password Help</span>
                <h1>Reset your password</h1>
                <p>Enter your email address and we will send you a password reset link.</p>
            </div>

            <form id="forgot-password-form" class="auth-form">
                <label class="input-group" for="forgot-email">
                    <span>Email</span>
                    <input id="forgot-email" name="email" type="email" placeholder="you@example.com" required>
                </label>

                <button type="submit" class="auth-button">Send Reset Link</button>
                <p id="forgot-message" class="form-message" aria-live="polite"></p>
            </form>

            <p class="auth-switch">
                Back to
                <a href="http://127.0.0.1:8000/login.html">Login</a>
            </p>
        </section>
    </main>

    <script src="/frontend/js/auth.js"></script>
</body>
</html>
