<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-copy">
                <span class="auth-eyebrow">Welcome Back</span>
                <h1>Login to continue</h1>
                <p>Access your account with the email and password you used to sign up.</p>
            </div>

            <form id="login-form" class="auth-form">
                <label class="input-group" for="login-email">
                    <span>Email</span>
                    <input id="login-email" name="email" type="email" placeholder="you@example.com" required>
                </label>

                <label class="input-group" for="login-password">
                    <span>Password</span>
                    <input id="login-password" name="password" type="password" placeholder="Enter your password" required>
                </label>

                <button type="submit" class="auth-button">Login</button>
                <p id="login-message" class="form-message" aria-live="polite"></p>
            </form>

            <p class="auth-switch auth-switch-left">
                <a href="http://127.0.0.1:8000/forgot-password.html">Forgot password?</a>
            </p>

            <p class="auth-switch">
                New here?
                <a href="http://127.0.0.1:8000/signup.html">Create an account</a>
            </p>
        </section>
    </main>

    <script src="/frontend/js/auth.js"></script>
</body>
</html>
