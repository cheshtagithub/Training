<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto fill full name</title>
    <link rel="stylesheet" href="../css/autoFillFullName.css">
</head>
<body>
    <div class="container">
        <h2>Full Name Generator</h2>

        <label>First Name:</label>
        <input type="text" id="fname" placeholder="Enter your First Name" >

        <label>Last Name:</label>
        <input type="text" id="lname" placeholder="Enter your Lat Name">

        <label>Full Name:</label>
        <input type="text" id="fullName" placeholder="Full Name" readonly>
    </div>
    
    <script src="../js/autoFillFullName.js"></script>
</body>
</html>
